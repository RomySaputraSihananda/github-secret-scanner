# Copy this file to config.toml and fill in your secrets.
# config.toml is gitignored and must NEVER be committed.

[github]
token = ""          # optional — increases rate limit from 10 to 30 req/min
keywords = [
  "solana private key",
  "PRIVATE_KEY=",
  "phantom wallet seed",
  "secret_key solana",
  "id_keypair",
]
interval_secs = 120

[openrouter]
api_key = ""
model = "nvidia/nemotron-3-super-120b-a12b:free"
fallback_models = [
  "meta-llama/llama-3.1-8b-instruct:free",
  "mistralai/mistral-7b-instruct:free",
  "microsoft/phi-3-mini-128k-instruct:free",
  "qwen/qwen-2-7b-instruct:free",
  "google/gemma-3-4b-it:free",
  "minimax/minimax-m2.5",
  "minimax/minimax-m2.7",
]

[telegram]
bot_token = ""
chat_id = ""
message_thread_id =     # optional — untuk kirim ke thread/topic tertentu di group

[alchemy]
api_key = ""            # dari https://dashboard.alchemy.com — buat app Solana Mainnet
